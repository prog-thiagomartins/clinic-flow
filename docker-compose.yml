version: "3.9"

services:

  db:
    image: postgres:16-alpine
    container_name: clinicflow_db
    environment:
      POSTGRES_USER: clinicflow
      POSTGRES_PASSWORD: clinicflow
      POSTGRES_DB: clinicflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinicflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: clinicflow_backend
    environment:
      DATABASE_URL: postgresql://clinicflow:clinicflow@db:5432/clinicflow
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  frontend:
    build: ./frontend
    container_name: clinicflow_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
